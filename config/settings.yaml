# グローバル設定ファイル
# アカウント共通の設定。アカウント個別の設定はconfig/accounts/{id}.yamlで上書き可能。

video:
  resolution: "1920x1080"
  fps: 30
  codec: "libx264"
  profile: "high"     # H.264プロファイル（YouTube推奨）
  crf: 18             # 23→18（高品質・visually lossless相当）
  preset: "medium"    # fast→medium（CI許容範囲でより高品質）
  pix_fmt: "yuv420p"  # YouTube互換ピクセルフォーマット
  movflags: "faststart" # ストリーミング最適化（moovアトムを先頭に）
  audio_codec: "aac"
  audio_bitrate: "192k"
  transition: "dissolve" # クリップ間トランジション: dissolve | fade | wipeleft | wiperight | none
  transition_sec: 0.5    # トランジション時間（秒）

subtitle:
  font_name: "Noto Sans CJK JP"
  font_size: 65               # テキストサイズ（13×5）
  primary_color: "&H000066FF" # オレンジ文字 #FF6600（ASS形式: &H00BBGGRR）
  outline_color: "&H00000000" # 黒アウトライン
  border_style: 1             # 1=アウトライン＋シャドウ
  bold: true                  # 太字
  outline_size: 3             # アウトライン太さ（px）
  shadow_size: 1              # ドロップシャドウ（px）
  margin_v: 30                # 画面下端からのマージン（px）
  reveal_ms: 600              # フェードインアニメーション時間(ms)（libassは\clip\t()未サポートのため\fad使用）

thumbnail:
  width: 1280
  height: 720
  font_size: 37               # 56→37（÷1.5）
  text_color: "#FFFFFF"
  shadow_color: "#000000"
  extract_time_pct: 0.35      # 0.10→0.35（より見どころのある場面を抽出）

audio:
  bgm_volume_db: -18.0        # BGMを-18dBFSに下げてミックス
  narration_volume_db: 0.0
  fade_in_sec: 1.0
  fade_out_sec: 2.0
  ducking_db: -10.0           # ナレーション中にBGMをさらに下げる量（dB）
  ducking_attack_ms: 200      # ダッキング開始時間（ms）
  ducking_release_ms: 500     # ダッキング解除時間（ms）

tts:
  provider: "edge_tts"        # edge_tts（無料・推奨）/ google_tts（要GCP認証）
  language_code: "ja-JP"
  audio_encoding: "MP3"
  effects_profile: ["headphone-class-device"]

pexels:
  per_section: 2              # 各セクションに使う動画クリップ数
  min_duration_sec: 5
  max_duration_sec: 30
  min_width: 1920
  locale: "ja-JP"

pipeline:
  temp_dir: "/tmp/yt_automation"
  cleanup_on_success: true
  cleanup_on_failure: false   # デバッグのため失敗時は残す
  dry_run: false              # trueにすると投稿せずにファイルだけ生成

# ショート動画（YouTube Shorts / TikTok）用設定
shorts:
  resolution: "1080x1920"
  fps: 30
  target_duration_sec: 55    # 60秒未満（YouTube Shortsの条件）
  codec: "libx264"
  profile: "high"
  crf: 18
  preset: "medium"
  pix_fmt: "yuv420p"
  movflags: "faststart"
  audio_codec: "aac"
  audio_bitrate: "192k"
  transition: "dissolve"     # Shorts用トランジション
  transition_sec: 0.3        # Shortsは短めのトランジション

  subtitle:
    font_size: 100            # 20×5
    margin_v: 400             # 説明欄・いいね・コメントボタンと重ならない位置

  thumbnail:
    width: 1080
    height: 1920
    font_size: 32             # 48→32（÷1.5）
    extract_time_pct: 0.35

  pexels:
    per_section: 2
    min_duration_sec: 3       # ショートは短いクリップでもOK
    max_duration_sec: 20
    min_width: 1080           # 縦型素材も可（1080p）
    locale: "ja-JP"
