# グローバル設定ファイル
# アカウント共通の設定。アカウント個別の設定はconfig/accounts/{id}.yamlで上書き可能。

video:
  resolution: "1920x1080"
  fps: 30
  codec: "libx264"
  crf: 23             # 品質（低いほど高品質・大容量）
  preset: "fast"      # エンコード速度（GitHub Actions向け）
  audio_codec: "aac"
  audio_bitrate: "192k"

subtitle:
  font_name: "Noto Sans CJK JP"
  font_size: 20               # 28→20（小さく・すっきり）
  primary_color: "&HFFFFFF"   # 白文字
  outline_color: "&H000000"   # 黒アウトライン
  border_style: 1             # 3→1（アウトラインのみ・黒背景ボックスなし）
  margin_v: 30                # 画面下端からのマージン（px）

thumbnail:
  width: 1280
  height: 720
  font_size: 56               # 52→56（2行レイアウト用）
  text_color: "#FFFFFF"
  shadow_color: "#000000"
  extract_time_pct: 0.35      # 0.10→0.35（より見どころのある場面を抽出）

audio:
  bgm_volume_db: -18.0        # BGMを-18dBFSに下げてミックス
  narration_volume_db: 0.0
  fade_in_sec: 1.0
  fade_out_sec: 2.0

tts:
  provider: "google_tts"      # デフォルトプロバイダー
  language_code: "ja-JP"
  audio_encoding: "MP3"
  effects_profile: ["headphone-class-device"]

pexels:
  per_section: 2              # 各セクションに使う動画クリップ数
  min_duration_sec: 5
  max_duration_sec: 30
  min_width: 1920
  locale: "ja-JP"

pipeline:
  temp_dir: "/tmp/yt_automation"
  cleanup_on_success: true
  cleanup_on_failure: false   # デバッグのため失敗時は残す
  dry_run: false              # trueにすると投稿せずにファイルだけ生成

# ショート動画（YouTube Shorts / TikTok）用設定
shorts:
  resolution: "1080x1920"
  fps: 30
  target_duration_sec: 55    # 60秒未満（YouTube Shortsの条件）
  codec: "libx264"
  crf: 23
  preset: "fast"
  audio_codec: "aac"
  audio_bitrate: "192k"

  subtitle:
    font_size: 30             # 縦型は横幅が狭いため少し大きめ
    margin_v: 120             # 下部UI（いいね・コメントボタン）と重ならない位置

  thumbnail:
    width: 1080
    height: 1920
    font_size: 48
    extract_time_pct: 0.35

  pexels:
    per_section: 2
    min_duration_sec: 3       # ショートは短いクリップでもOK
    max_duration_sec: 20
    min_width: 1080           # 縦型素材も可（1080p）
    locale: "ja-JP"
