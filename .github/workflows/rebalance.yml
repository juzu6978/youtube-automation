# 週次リバランスワークフロー
# 毎週月曜 08:00 UTC に全アカウントのスコアを計算し、
# 投稿頻度を自動調整して config と ワークフローファイルを更新する。

name: Rebalance Upload Frequencies

on:
  schedule:
    - cron: "0 8 * * 1"   # 毎週月曜 08:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（ファイル書き換えなし）"
        type: boolean
        default: false

jobs:
  rebalance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run performance scorer (rebalance)
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/10_performance_scorer.py --mode rebalance $DRY_FLAG

      - name: Regenerate per-account workflow schedules
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/10_performance_scorer.py --mode generate-workflows $DRY_FLAG

      - name: Commit updated configs and workflows
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "yt-automation-bot"
          git config user.email "bot@noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}"
          git add config/accounts/*.yaml
          git add .github/workflows/upload_account_*.yml
          git diff --staged --quiet || \
            git commit -m "chore: rebalance upload frequencies $(date -u +%Y-%m-%d)"
          git push

      - name: Print ranking summary
        run: python scripts/10_performance_scorer.py --mode score-only
