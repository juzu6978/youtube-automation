# 再利用可能ワークフロー（Reusable Workflow）
# このファイルは直接スケジュール実行されない。
# upload_account_XX.yml から workflow_call で呼び出される。

name: Upload Video - Reusable

on:
  workflow_call:
    inputs:
      account_id:
        required: true
        type: string
        description: "アカウントID（config/accounts/{id}.yaml と一致）"
      run_id:
        required: false
        type: string
        default: ""
        description: "実行ID（省略時は自動生成）"
      dry_run:
        required: false
        type: boolean
        default: false
        description: "trueにすると投稿せずテストのみ"
      use_sample:
        required: false
        type: boolean
        default: false
        description: "trueにするとAssets/sample/のJSONを使用（Anthropic API不要）"
    secrets:
      YOUTUBE_REFRESH_TOKEN:
        required: true
      YOUTUBE_CLIENT_ID:
        required: true
      YOUTUBE_CLIENT_SECRET:
        required: true
      ANTHROPIC_API_KEY:
        required: true
      GCP_CREDENTIALS_JSON:
        required: true
      PEXELS_API_KEY:
        required: false
      PIXABAY_API_KEY:
        required: false

jobs:
  produce-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (FFmpeg, ImageMagick, fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            imagemagick \
            fonts-noto-cjk \
            libmagic1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download Noto Sans CJK font (if not available system-wide)
        run: |
          FONT_DIR="assets/fonts"
          mkdir -p "$FONT_DIR"
          if [ ! -f "$FONT_DIR/NotoSansCJK-Regular.ttc" ]; then
            SYSTEM_FONT="/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc"
            if [ -f "$SYSTEM_FONT" ]; then
              cp "$SYSTEM_FONT" "$FONT_DIR/"
            fi
          fi

      - name: Set up Google Cloud credentials (for TTS)
        run: |
          echo "${{ secrets.GCP_CREDENTIALS_JSON }}" | base64 -d > /tmp/gcp_credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_credentials.json" >> $GITHUB_ENV

      - name: Determine run ID
        id: run_id
        run: |
          RUN_ID="${{ inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(date -u +%Y%m%d_%H%M%S)
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Run video generation pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --dry-run"
          fi
          if [ "${{ inputs.use_sample }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --use-sample"
          fi
          python scripts/main.py \
            --account-id "${{ inputs.account_id }}" \
            --run-id "${{ steps.run_id.outputs.run_id }}" \
            $EXTRA_ARGS

      - name: Show upload result
        if: always()
        run: |
          RESULT_FILE="/tmp/yt_automation/${{ inputs.account_id }}/${{ steps.run_id.outputs.run_id }}/upload_result.json"
          if [ -f "$RESULT_FILE" ]; then
            echo "=== Upload Result ==="
            cat "$RESULT_FILE"
          fi

      - name: Cleanup temp files
        if: always()
        run: |
          rm -rf /tmp/yt_automation/${{ inputs.account_id }}
          rm -f /tmp/gcp_credentials.json
